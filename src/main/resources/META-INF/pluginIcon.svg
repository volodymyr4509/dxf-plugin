<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Card background -->
  <rect x="1" y="1" width="38" height="38" rx="3" ry="3"
        fill="none" stroke="#7a7a7a" stroke-width="0.8"/>

  <!-- Technical drawing: outer frame -->
  <rect x="5" y="6" width="30" height="22" rx="1"
        fill="none" stroke="#7a7a7a" stroke-width="0.7"/>

  <!-- Floor-plan style walls -->
  <rect x="9" y="10" width="9" height="7"
        fill="none" stroke="#5a5a5a" stroke-width="0.9"/>
  <rect x="22" y="10" width="9" height="7"
        fill="none" stroke="#5a5a5a" stroke-width="0.9"/>
  <rect x="9" y="19" width="22" height="6"
        fill="none" stroke="#5a5a5a" stroke-width="0.9"/>

  <!-- Dimension lines (horizontal) -->
  <line x1="5" y1="32" x2="35" y2="32"
        stroke="#9e9e9e" stroke-width="0.5" stroke-dasharray="3,1.5"/>
  <!-- Dimension tick marks -->
  <line x1="5"  y1="30.5" x2="5"  y2="33.5" stroke="#9e9e9e" stroke-width="0.5"/>
  <line x1="35" y1="30.5" x2="35" y2="33.5" stroke="#9e9e9e" stroke-width="0.5"/>

  <!-- "DXF" label -->
  <text x="20" y="38.5" text-anchor="middle"
        font-size="5.5" font-weight="bold" font-family="sans-serif"
        fill="#7a7a7a">DXF</text>
</svg>
